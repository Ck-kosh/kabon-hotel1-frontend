services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kabon-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=your-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - kabon-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kabon-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    command: npm run dev -- --host
    depends_on:
      - backend
    networks:
      - kabon-network

networks:
  kabon-network:
    driver: bridge
